name: validate items.json

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run validation
        run: node scripts/validate-items.mjs
