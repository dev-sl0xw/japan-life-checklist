<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <title>Japan Life Checklist</title>
  <link rel="stylesheet" href="./css/custom.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
  <header class="max-w-5xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold">🗾 Japan Life Checklist</h1>
    <p class="text-sm text-slate-500" id="data-version-display">data_version: loading…</p>
  </header>

  <main class="max-w-5xl mx-auto px-4 pb-12">
    <section id="profile-panel" aria-label="내 상황 (My Profile)">
      <h2 class="text-lg font-semibold mb-2">📋 내 상황 (My Profile)</h2>
      <div id="profile-flags" class="grid grid-cols-1 md:grid-cols-2 gap-2">
        <p class="text-slate-500">profile flags will render here</p>
      </div>
    </section>

    <section id="checklist" aria-label="체크리스트" class="mt-8">
      <h2 class="text-lg font-semibold mb-2">체크리스트</h2>
      <div id="categories-root">
        <p class="text-slate-500">categories will render here</p>
      </div>
    </section>

    <div id="banner-region" aria-live="polite" class="mt-4"></div>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
